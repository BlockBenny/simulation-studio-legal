<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simulation Studio — Auth Callback</title>
<style>
body { font-family: -apple-system, system-ui, sans-serif; max-width: 700px; margin: 80px auto; padding: 0 20px; color: #333; text-align: center; }
h1 { color: #22c55e; }
code { background: #f3f4f6; padding: 2px 8px; border-radius: 4px; }
</style>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if (code) {
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('code').textContent = code;
        document.getElementById('success').style.display = 'block';
        document.getElementById('nocode').style.display = 'none';
    });
}
</script>
</head>
<body>
<div id="success" style="display:none;">
    <h1>Authorization Successful</h1>
    <p>Copy this code and paste it into the terminal:</p>
    <p><code id="code"></code></p>
</div>
<div id="nocode">
    <h1>Auth Callback</h1>
    <p>This page handles TikTok OAuth callbacks for Simulation Studio.</p>
</div>
</body>
</html>
